<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쿠팡이츠 즐겨찾기 UX 개선 — 클로드 구현</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --blue:#1A8CFF;
  --blue-cta:#2B90F4;
  --blue-deep:#0F1B3D;
  --sky:#15B9F0;
  --ink:#1A1A1A;
  --gray-9:#222;
  --gray-7:#444;
  --gray-6:#666;
  --gray-5:#8A8A8E;
  --gray-4:#AEAEB2;
  --gray-3:#C7C7CC;
  --line:#EFEFF0;
  --line-2:#E5E5EA;
  --bg:#F2F3F5;
  --chip:#F2F3F5;
  --gold:#FFB400;
  --red:#FF3B30;
  --green:#00A862;
  --phone-w:360px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#E9EBEF;
  color:var(--ink);
  letter-spacing:-0.2px;
}
.material-symbols-rounded{display:inline-block;width:1em;height:1em;vertical-align:-.18em;flex-shrink:0;fill:currentColor;}
.material-symbols-rounded path{fill:currentColor;}

/* ---------- page chrome ---------- */
.page-head{
  text-align:center;padding:54px 20px 10px;
}
.page-head .kicker{
  display:inline-block;font-size:13px;font-weight:600;color:var(--blue);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;
}
.page-head h1{font-size:34px;font-weight:800;letter-spacing:-1px;color:#10131A;}
.page-head p{margin-top:14px;font-size:15px;color:var(--gray-6);line-height:1.7;}
.page-head .meta{margin-top:18px;font-size:12.5px;color:var(--gray-5);}

.flow-section{max-width:1640px;margin:0 auto;padding:8px 32px 30px;}
.section-bar{
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(90deg,#15B9F0,#1A8CFF);
  color:#fff;border-radius:12px;padding:16px 22px;margin:46px 0 30px;
  box-shadow:0 8px 22px -10px rgba(26,140,255,.55);
}
.section-bar .idx{font-size:13px;font-weight:700;background:rgba(255,255,255,.22);
  padding:4px 11px;border-radius:20px;letter-spacing:.5px;}
.section-bar h2{font-size:19px;font-weight:700;letter-spacing:-.4px;}
.section-bar .desc{margin-left:auto;font-size:13px;font-weight:500;opacity:.92;}

.phones{display:flex;flex-wrap:wrap;gap:30px 28px;align-items:flex-start;}
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;}
.phone-label{font-size:13px;font-weight:600;color:var(--gray-6);}
.phone-label b{color:var(--blue);font-weight:700;}

/* ---------- phone frame ---------- */
.phone{
  width:var(--phone-w);
  background:#fff;border-radius:30px;overflow:hidden;
  box-shadow:0 18px 50px -18px rgba(20,30,60,.32),0 0 0 1px rgba(0,0,0,.04);
  position:relative;
}
.screen{position:relative;background:#fff;height:800px;display:flex;flex-direction:column;overflow:hidden;}
.screen>.top{flex:0 0 auto;z-index:6;background:#fff;}
.screen>.scroll{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;position:relative;}
.screen>.scroll::-webkit-scrollbar{width:0;height:0;}
.screen>.dock{flex:0 0 auto;z-index:6;background:#fff;}
[data-fav]{cursor:pointer;}

/* status bar */
.statusbar{
  height:44px;display:flex;align-items:center;justify-content:space-between;
  padding:0 22px 0 26px;font-size:15px;font-weight:600;color:#1A1A1A;
  background:#fff;position:relative;z-index:5;
}
.statusbar.onimg{color:#fff;background:transparent;position:absolute;top:0;left:0;right:0;}
.statusbar .sb-right{display:flex;align-items:center;gap:6px;}
.statusbar .sb-right .material-symbols-rounded{font-size:18px;}
.sb-bars{display:flex;align-items:flex-end;gap:2px;height:11px;}
.sb-bars i{width:3px;background:currentColor;border-radius:1px;display:block;}
.sb-bars i:nth-child(1){height:4px}.sb-bars i:nth-child(2){height:6px}
.sb-bars i:nth-child(3){height:8px}.sb-bars i:nth-child(4){height:11px}
.sb-batt{width:24px;height:12px;border:1.5px solid currentColor;border-radius:3px;position:relative;padding:1.5px;}
.sb-batt::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:currentColor;border-radius:0 1px 1px 0;}
.sb-batt span{display:block;height:100%;width:80%;background:currentColor;border-radius:1px;}

/* home indicator */
.home-ind{height:22px;display:flex;align-items:center;justify-content:center;background:#fff;}
.home-ind::after{content:"";width:128px;height:5px;border-radius:3px;background:#111;opacity:.92;}
.home-ind.dark::after{background:#fff;}

/* scroll body */
.body{overflow:hidden;}

/* ---------- HOME ---------- */
.home-loc{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 10px;}
.home-loc .loc{display:flex;align-items:center;gap:3px;font-size:19px;font-weight:700;}
.home-loc .loc .pin{font-size:21px;}
.home-loc .loc .material-symbols-rounded.chev{font-size:22px;color:var(--blue);}
.home-loc .bell{font-size:25px;position:relative;color:#1A1A1A;}
.home-loc .bell .dot{position:absolute;top:1px;right:1px;width:7px;height:7px;background:var(--blue);border-radius:50%;border:1.5px solid #fff;}
.searchbar{margin:2px 16px 14px;height:46px;background:#F4F5F7;border-radius:12px;display:flex;align-items:center;gap:10px;padding:0 14px;color:var(--gray-5);font-size:15px;font-weight:500;}
.searchbar .material-symbols-rounded{font-size:23px;color:#1A1A1A;}
.cat-row{display:flex;gap:0;padding:6px 12px 12px;overflow:hidden;}
.cat{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:7px;}
.cat img{width:54px;height:54px;border-radius:16px;object-fit:cover;}
.cat span{font-size:12px;font-weight:500;color:#333;white-space:nowrap;}
.quick-row{display:flex;gap:0;padding:4px 10px 16px;border-bottom:9px solid #F2F3F5;}
.quick{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:7px;}
.quick .ic{width:50px;height:50px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#F6F7F9;}
.quick .ic img{width:100%;height:100%;object-fit:cover;}
.quick span{font-size:12px;font-weight:500;color:#333;text-align:center;line-height:1.25;white-space:pre-line;}
.banner{margin:16px;border-radius:14px;overflow:hidden;position:relative;}
.banner img{width:100%;display:block;}
.banner .pg{position:absolute;right:10px;bottom:10px;background:rgba(0,0,0,.45);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.fav-home-head{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 12px;}
.fav-home-head h3{font-size:19px;font-weight:800;letter-spacing:-.5px;}
.fav-home-head .material-symbols-rounded{font-size:24px;color:#222;}
.fav-carousel{display:flex;gap:11px;padding:0 16px 18px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;cursor:grab;}
.fav-carousel::-webkit-scrollbar{display:none;}
.fav-card{width:158px;flex:0 0 auto;border-radius:14px;overflow:hidden;position:relative;background:#eee;box-shadow:0 4px 12px -6px rgba(0,0,0,.2);}
.fav-card img{width:100%;height:200px;object-fit:cover;display:block;}
.fav-card .grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.05) 48%);}
.fav-card .txt{position:absolute;left:12px;right:12px;bottom:12px;color:#fff;}
.fav-card .txt .st{font-size:11px;opacity:.92;margin-bottom:3px;}
.fav-card .txt .mn{font-size:15px;font-weight:700;margin-bottom:3px;}
.fav-card .txt .pr{font-size:15px;font-weight:700;}

/* bottom nav */
.tabbar{display:flex;border-top:1px solid var(--line);background:#fff;padding:7px 0 3px;}
.tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:#B0B3B8;font-size:10.5px;font-weight:600;}
.tabbar .tab .material-symbols-rounded{font-size:25px;}
.tabbar .tab.on{color:#1A1A1A;}

/* ---------- 즐겨찾기 공통 ---------- */
.fav-top{display:flex;align-items:center;gap:12px;padding:6px 16px 12px;}
.fav-top .material-symbols-rounded.back{font-size:26px;}
.fav-top h2{font-size:20px;font-weight:700;flex:1;}
.fav-top .edit{font-size:15px;font-weight:600;color:var(--blue);}
.fav-tabs{display:flex;border-bottom:1px solid var(--line-2);}
.fav-tabs .ft{flex:1;text-align:center;padding:12px 0 14px;font-size:16px;font-weight:700;color:var(--gray-4);position:relative;}
.fav-tabs .ft.on{color:var(--blue);}
.fav-tabs .ft.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2.5px;background:var(--blue);}
.chips{display:flex;gap:8px;padding:14px 16px 10px;overflow-x:auto;overflow-y:hidden;flex-wrap:nowrap;scrollbar-width:none;cursor:grab;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;padding:8px 16px;border-radius:20px;background:var(--chip);font-size:14px;font-weight:600;color:#3A3A3C;cursor:pointer;white-space:nowrap;}
.chip.on{background:#111;color:#fff;}
.chip.on.blue{background:var(--blue);}
.sortbar{display:flex;align-items:center;gap:3px;padding:6px 18px 14px;font-size:14px;font-weight:600;color:#333;}
.sortbar .material-symbols-rounded{font-size:19px;}

/* 음식탭 grid */
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px 14px;padding:2px 16px 18px;}
.fg{position:relative;}
.fg .thumb{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:1/1;background:#fff;border:1px solid var(--line);}
.fg .thumb img{width:100%;height:100%;object-fit:contain;display:block;}
.fg .addcart{position:absolute;right:8px;bottom:8px;width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.fg .addcart .material-symbols-rounded{font-size:20px;color:var(--sky);}
.fg .qty{position:absolute;right:8px;bottom:8px;width:34px;height:34px;border-radius:50%;background:var(--sky);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;box-shadow:0 3px 8px rgba(0,0,0,.22);}
.fg .st{font-size:11.5px;color:var(--gray-5);margin:9px 0 2px;}
.fg .mn{font-size:15px;font-weight:700;letter-spacing:-.3px;}
.fg .pr{font-size:16px;font-weight:700;margin-top:1px;}
.fg .rt{display:flex;align-items:center;gap:7px;margin-top:6px;font-size:11.5px;color:var(--gray-6);font-weight:500;flex-wrap:nowrap;white-space:nowrap;}
.fg .rt span.material-symbols-rounded{font-size:14px;}
.fg .rt .it{display:flex;align-items:center;gap:2px;flex:0 0 auto;white-space:nowrap;}
.fg .rt .dot{color:var(--gray-3);}

/* 가게탭 list */
.store-list{padding:4px 16px 16px;}
.store-card{border:1px solid var(--line-2);border-radius:14px;padding:12px;margin-bottom:14px;}
.store-card .row{display:flex;gap:12px;}
.store-card .simg{width:96px;height:96px;border-radius:10px;overflow:hidden;position:relative;flex:0 0 auto;background:#eee;}
.store-card .simg img{width:100%;height:100%;object-fit:cover;}
.store-card .simg .ord{position:absolute;top:0;left:0;background:#FFE9A8;color:#7A5A00;font-size:11px;font-weight:700;padding:3px 8px;border-radius:0 0 8px 0;}
.store-card .simg .wow{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:600;text-align:center;padding:3px 2px;}
.store-card .simg .ovl{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;text-align:center;line-height:1.3;}
.store-card .info{flex:1;min-width:0;}
.store-card .info .nm{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.store-card .info .nm b{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.store-card .info .nm .material-symbols-rounded{font-size:22px;color:#999;}
.store-card .info .rev{display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;margin-top:5px;}
.store-card .info .rev .material-symbols-rounded{font-size:15px;color:var(--gold);}
.store-card .info .rev em{color:var(--gray-5);font-weight:500;font-style:normal;}
.store-card .info .meta{font-size:12.5px;color:var(--gray-6);margin-top:5px;}
.store-card .tags{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
.tag{font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;background:#F2F3F5;color:#555;}
.tag.cpn{background:#E8F4FF;color:#1577E0;}
.tag.evt{background:#FFF0F0;color:#E0455B;}

/* 재주문 펼침 */
.reorder{border-top:1px solid var(--line);margin-top:12px;padding-top:14px;display:none;}
.store-card.expanded .reorder{display:block;}
.store-card .nm{cursor:pointer;}
.reorder .ro-it{margin-bottom:6px;}
.reorder .ro-h{font-size:14px;font-weight:700;}
.reorder .ro-date{font-size:11.5px;color:var(--gray-5);margin:3px 0 8px;}
.reorder .ro-opt{font-size:12.5px;color:var(--gray-6);line-height:1.7;}
.reorder .ro-pay{display:flex;align-items:center;justify-content:space-between;margin:12px 0 10px;}
.reorder .ro-pay span{font-size:14px;font-weight:600;}
.reorder .ro-pay b{font-size:17px;font-weight:800;}
.btn{display:flex;align-items:center;justify-content:center;border-radius:10px;font-weight:700;font-size:15px;}
.btn-primary{background:var(--blue-cta);color:#fff;height:48px;}
.btn-outline{border:1.4px solid var(--blue);color:var(--blue);height:48px;background:#fff;}
.reorder .divider2{height:1px;background:var(--line);margin:16px 0 14px;}

/* bottom sheet */
.sheet-wrap{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;z-index:20;}
.sort-sheet{cursor:pointer;}
.sort-sheet .sheet{animation:sheetUp .24s ease;}
.sort-x{cursor:pointer;}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:none;}}
.sheet{width:100%;background:#fff;border-radius:18px 18px 0 0;padding:10px 0 8px;}
.sheet .grab{width:42px;height:4px;background:#D9D9DE;border-radius:3px;margin:6px auto 12px;}
.sheet .sh-head{display:flex;align-items:center;justify-content:center;position:relative;padding:6px 20px 14px;}
.sheet .sh-head b{font-size:17px;font-weight:700;}
.sheet .sh-head .material-symbols-rounded{position:absolute;right:18px;font-size:24px;color:#444;}
.sheet .opt{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 0;font-size:16px;color:#333;position:relative;}
.sheet .opt.sel{font-weight:700;color:#111;}
.sheet .opt .material-symbols-rounded{position:absolute;left:24px;font-size:22px;color:var(--blue);}

/* dialog */
.dim{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:25;padding:0 28px;}
.dialog{width:100%;background:#fff;border-radius:16px;padding:24px 22px 8px;}
.dialog h4{font-size:16.5px;font-weight:700;margin-bottom:10px;}
.dialog p{font-size:14px;color:var(--gray-6);line-height:1.55;}
.dialog .acts{display:flex;justify-content:flex-end;gap:26px;margin-top:20px;padding-bottom:8px;}
.dialog .acts b{font-size:15px;font-weight:700;color:var(--blue);padding:6px 2px;}

/* ---------- 가게 상세 ---------- */
.detail-hero{position:relative;height:230px;overflow:hidden;background:#caa;}
.detail-hero img{width:100%;height:100%;object-fit:cover;}
.detail-hero .topbar{position:absolute;top:44px;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:6px 16px;}
.detail-hero .topbar .material-symbols-rounded{font-size:26px;color:#fff;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));}
.detail-hero .pgn{position:absolute;bottom:12px;left:16px;background:rgba(0,0,0,.5);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.detail-hero .right-ic{display:flex;gap:16px;}
.dt-head{padding:16px 18px 10px;}
.dt-head h2{font-size:22px;font-weight:800;}
.dt-head .rt{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:14px;font-weight:600;}
.dt-head .rt .material-symbols-rounded{font-size:17px;color:var(--blue);}
.dt-head .rt em{color:var(--gray-5);font-style:normal;font-weight:500;}
.dt-toggle{display:flex;margin:6px 18px 14px;border:1px solid var(--line-2);border-radius:10px;overflow:hidden;}
.dt-toggle div{flex:1;text-align:center;padding:11px 0;font-size:14px;font-weight:700;color:var(--gray-5);}
.dt-toggle div.on{background:#111;color:#fff;}
.dt-info{padding:0 18px 14px;border-bottom:9px solid #F2F3F5;}
.dt-info .li{display:flex;gap:10px;font-size:13.5px;margin-bottom:7px;color:#333;}
.dt-info .li b{font-weight:600;color:#000;min-width:64px;}
.dt-promo{margin:14px 18px;background:linear-gradient(90deg,#1A8CFF,#15B9F0);color:#fff;border-radius:12px;padding:14px 16px;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.dt-promo .material-symbols-rounded{font-size:20px;}
.dt-sub{display:flex;align-items:center;justify-content:space-between;padding:4px 18px 14px;font-size:13px;color:#555;border-bottom:9px solid #F2F3F5;}
.dt-menutabs{display:flex;gap:18px;padding:14px 18px;border-bottom:1px solid var(--line);font-size:14px;font-weight:600;color:var(--gray-5);overflow:hidden;}
.dt-menutabs .on{color:#111;font-weight:700;}
.dt-sech{padding:16px 18px 10px;font-size:17px;font-weight:800;}
.pop-grid{display:flex;gap:10px;padding:0 18px 16px;overflow:hidden;}
.pop{flex:0 0 auto;width:104px;}
.pop .pimg{position:relative;border-radius:12px;overflow:hidden;height:104px;background:#eee;}
.pop .rank{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.3);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;z-index:2;}
.pop .pimg img{width:100%;height:100%;object-fit:cover;}
.pop .pimg .addcart{position:absolute;right:6px;bottom:6px;width:30px;height:30px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 7px rgba(0,0,0,.22);}
.pop .pimg .addcart .material-symbols-rounded{font-size:18px;color:var(--sky);}
.pop .pimg .q{position:absolute;right:6px;bottom:6px;width:30px;height:30px;border-radius:50%;background:var(--sky);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.pop .nm{font-size:13px;font-weight:600;margin-top:8px;}
.pop .pr{font-size:13.5px;font-weight:700;margin-top:2px;}
.menu-li{display:flex;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);}
.menu-li .ml-txt{flex:1;}
.menu-li .ml-txt .nm{font-size:15px;font-weight:700;}
.menu-li .ml-txt .ds{font-size:12px;color:var(--gray-5);margin-top:5px;line-height:1.5;}
.menu-li .ml-txt .pr{font-size:15px;font-weight:700;margin-top:8px;}
.menu-li .ml-txt .rt{font-size:11.5px;color:var(--gray-6);margin-top:6px;display:flex;align-items:center;gap:3px;}
.menu-li .ml-txt .rt .material-symbols-rounded{font-size:13px;}
.menu-li .mimg{width:92px;height:92px;border-radius:10px;overflow:hidden;flex:0 0 auto;background:#eee;}
.menu-li .mimg img{width:100%;height:100%;object-fit:cover;}

/* sticky bottom cart bar */
.cartbar{padding:10px 16px 8px;border-top:1px solid var(--line);}
.cartbar .promo{background:#EAF5FF;color:#1577E0;font-size:11.5px;font-weight:600;text-align:center;padding:8px;border-radius:8px;margin-bottom:9px;}
.cartbar .cbtn{height:50px;border-radius:12px;background:var(--blue-cta);display:flex;align-items:center;justify-content:center;gap:10px;color:#fff;font-size:16px;font-weight:700;position:relative;}
.cartbar .cbtn .material-symbols-rounded{font-size:22px;position:absolute;left:18px;}
.cartbar .cbtn .old{font-size:13px;font-weight:500;text-decoration:line-through;opacity:.7;margin-right:2px;}

/* ---------- 음식 상세 ---------- */
.fd-hero{height:300px;position:relative;background:#eee;}
.fd-hero img{width:100%;height:100%;object-fit:cover;}
.fd-hero .topbar{position:absolute;top:44px;left:0;right:0;display:flex;justify-content:space-between;padding:6px 16px;}
.fd-hero .topbar .material-symbols-rounded{font-size:26px;color:#fff;filter:drop-shadow(0 1px 3px rgba(0,0,0,.45));}
.fd-body{padding:18px;}

const mi = (n,cls='')=>{
  const e = ICONS[n]; let d = e;
  if(e && typeof e==='object'){ d = (cls.indexOf('fill')>-1 && e.f) ? e.f : (e.o||e.f); }
  return `<svg class="material-symbols-rounded ${cls}" viewBox="0 0 24 24" width="1em" height="1em" aria-hidden="true"><path d="${d||''}"/></svg>`;
};
const img = (k,cls='') => `<img class="${cls}" src="images/${enc(IMG[k])}" alt="">`;

/* ---------- shared components ---------- */
function statusBar(dark){
  return `<div class="statusbar ${dark?'onimg':''}">
    <span>9:41</span>
    <div class="sb-right">
      <span class="sb-bars"><i></i><i></i><i></i><i></i></span>
      ${mi('wifi')}
      <span class="sb-batt"><span></span></span>
    </div>
  </div>`;
}
function homeIndicator(dark){ return `<div class="home-ind ${dark?'dark':''}"></div>`; }
function tabbar(active){
  const tabs=[['home','홈','home'],['search','검색',''],['favorite','즐겨찾기','foodAll'],['event_available','주문내역',''],['person','My 이츠','']];
  return `<div class="tabbar">${tabs.map(([ic,l,go],i)=>
    `<div class="tab ${active===i?'on':''}" ${go?`data-go="${go}"`:'data-soon'}>${mi(ic,active===i?'fill':'')}<span>${l}</span></div>`).join('')}</div>`;
}
function phone(label,inner){ return inner; }
function ratingLine(good,rev){
  return `<div class="rt"><span class="it">${mi('thumb_up')}${good}</span><span class="dot">·</span><span class="it">${mi('rate_review')}${rev}</span></div>`;
}
function foodCard(d){
  const badge = d.qty ? `<div class="qty">${d.qty}</div>` :
    (d.cart ? `<div class="addcart">${mi('add_shopping_cart','fill')}</div>` : '');
  return `<div class="fg" data-go="foodDetail" data-mn="${d.mn}" data-img="${d.img}" data-pr="${d.pr}" data-st="${d.st}" data-good="${d.good}" data-rev="${d.rev}" data-cat="${d.cat||''}" data-fav-on="1">
    <div class="thumb">${img(d.img)}${badge}</div>
    <div class="st">${d.st}</div>
    <div class="mn">${d.mn}</div>
    <div class="pr">${d.pr}</div>
    ${ratingLine(d.good,d.rev)}
  </div>`;
}
function storeCard(d,expanded){
  const ovl = d.ovl ? `<div class="ovl">${d.ovl.replace(/\n/g,'<br>')}</div>` : '';
  const ord = d.ord ? `<div class="ord">${d.ord}</div>` : '';
  const tags = d.tags.map(([t,c])=>`<span class="tag ${c}">${t}</span>`).join('');
  return `<div class="store-card ${expanded?'expanded':''}">
    <div class="row">
      <div class="simg" data-go="storeDetail" data-snm="${d.nm}">${img(d.img)}${ord}${ovl}<div class="wow">${d.wow}</div></div>
      <div class="info">
        <div class="nm" data-expand><b>${d.nm}</b>${mi(expanded?'keyboard_arrow_up':'keyboard_arrow_down')}</div>
        <div class="rev">${mi('star','fill')}${d.star}<em>(${d.cnt})</em></div>
        <div class="meta">${d.meta}</div>
        ${tags?`<div class="tags">${tags}</div>`:''}
      </div>
    </div>
    ${reorderBlock(d)}
  </div>`;
}
function reorderBlock(d){
  const orders = (REORDERS[d.nm]) || [{mn:d.nm+' 대표 메뉴',qty:1,date:'2026-05-01 오후 07:16',opts:['기본 구성'],pay:'—'}];
  return `<div class="reorder">${orders.map((o,i)=>`
    <div class="ro-it">
      <div class="ro-h">${o.mn} <span style="color:#888;font-weight:500">${o.qty}개</span></div>
      <div class="ro-date">${o.date}</div>
      <div class="ro-opt">${o.opts.join('<br>')}</div>
      <div class="ro-pay"><span>결제 금액</span><b>${o.pay}</b></div>
      <div class="btn btn-primary" data-go="reorderWarn">재주문하기</div>
    </div>${i<orders.length-1?'<div class="divider2"></div>':''}`).join('')}
  </div>`;
}
function chips(active,blue){
  const cs=['전체','한식','치킨','분식','돈까스','구이','족발'];
  return `<div class="chips">${cs.map(c=>{
    const on = c===active;
    return `<div class="chip ${on?'on':''} ${on&&blue?'blue':''}">${c}</div>`;
  }).join('')}</div>`;
}
function favHeader(){
  return `<div class="fav-top"><span data-back>${mi('arrow_back','back')}</span><h2>즐겨찾기</h2><span class="edit">수정</span></div>`;
}
function favTabs(active){
  const food=favMenus.length, store=Object.keys(STORE_BY_NAME).length;
  return `<div class="fav-tabs">
    <div class="ft ${active==='food'?'on':''}" data-go="foodAll">음식 ${food}</div>
    <div class="ft ${active==='store'?'on':''}" data-go="storeRecent">가게 ${store}</div>
  </div>`;
}

async function loadFavorites(){
  const {data,error}=await sb.from('favorites').select('*').order('id');
  if(error){console.error('[favorites] 불러오기 실패:',error.message);return;}
  if(!data||data.length===0){
    const seen=new Set();
    const rows=favMenus.map(m=>({mn:m.mn,st:m.st||'',img:m.img,pr:m.pr,good:m.good,rev:m.rev,cat:m.cat})).filter(r=>{const k=r.mn+'|'+r.st;if(seen.has(k))return false;seen.add(k);return true;});
    const {error:e}=await sb.from('favorites').upsert(rows,{onConflict:'mn,st',ignoreDuplicates:true});
    if(e)console.error('[favorites] 초기 저장 실패:',e.message);
  } else {
    favMenus=data.map(r=>({mn:r.mn,st:r.st,img:r.img,pr:r.pr,good:r.good,rev:r.rev,cat:r.cat,cart:true}));
  }
  setScreen(current);
}

      renderFav(sc);
      return;
    }
    if(e.target===ss || e.target.closest('.sort-x')){ ss.remove(); }
    return;
  }
  // payment keypad
  const pad=e.target.closest('.pay-pad');
  if(pad){
    const key=e.target.closest('[data-key]');
    if(key){
      const k=key.getAttribute('data-key');
      if(k==='del') payEntered=payEntered.slice(0,-1);
      else if(payEntered.length<6) payEntered+=k;
      updatePayDots(pad);
      if(payEntered.length===6) setTimeout(()=>payComplete(pad),350);
      return;
    }
    if(e.target===pad || e.target.closest('.pay-x')){ pad.remove(); }
    return;
  }
  // 결제 비밀번호 키패드(결제탭)
  const pk=e.target.closest('[data-pkey]');
  if(pk && sc.contains(pk)){
    const k=pk.getAttribute('data-pkey');
    if(k==='del') payEntered=payEntered.slice(0,-1);
    else if(payEntered.length<6) payEntered+=k;
    sc.querySelectorAll('.pp-dot').forEach((d,i)=>d.classList.toggle('on', i<payEntered.length));
    if(payEntered.length===6){
      const body=sc.querySelector('.pw-body');
      if(body) body.innerHTML=`<div class="pp-done">${mi('check')}<div>결제가 완료되었어요</div></div>`;
      cart.active=false;
      setTimeout(()=>{ stack=[]; current='home'; setScreen('home'); },1000);
    }
    return;
  }
  // 다른 가게 메뉴 담기 경고 (카트 초기화)
  const cf=e.target.closest('.conflict-dim');
  if(cf){
    if(e.target.closest('.cf-ok')){ const ok=cf._ok; cart.active=false; cf.remove(); if(ok) ok(); if(current==='foodDetail') goBack(); return; }
    if(e.target.closest('.cf-cancel')||e.target===cf){ cf.remove(); }
    return;
  }
  // 준비 중 탭
  const soon=e.target.closest('[data-soon]');
  if(soon && sc.contains(soon)){ flashToast('준비 중인 기능이에요'); return; }
  // open sort sheet
  const st=e.target.closest('[data-sheet]');
  if(st && sc.contains(st)){ openSort(); return; }
  // favorite toggle (메뉴 찜 → 즐겨찾기 음식탭 누적)
  const fav=e.target.closest('[data-fav]');
  if(fav && sc.contains(fav)){
    const on=fav.classList.toggle('faved');
    fav.innerHTML=mi('favorite', on?'fill':'');
    let m=null;
    const card=fav.closest('[data-mn]');
    if(fav.classList.contains('heart')){ m={mn:detailFood.mn,img:detailFood.img,pr:detailFood.pr,st:detailFood.st,good:detailFood.good,rev:detailFood.rev,cat:detailFood.cat||STORE_CAT[detailFood.st]||'치킨',cart:true}; }
    else if(card){ m={mn:card.dataset.mn,img:card.dataset.img,pr:card.dataset.pr,st:card.dataset.st||'',good:card.dataset.good||'',rev:card.dataset.rev||'',cat:card.dataset.cat||STORE_CAT[card.dataset.st]||'치킨',cart:true}; }
    if(m){ if(on){ addFav(m); flashToast('음식을 즐겨찾기했어요'); } else { removeFav(m.mn,m.st); flashToast('즐겨찾기에서 뺐어요'); } }
    return;
  }
  // 배달 카트에 담기 → 담았어요 토스트 + 카트 보기 버튼으로 전환
  const add=e.target.closest('[data-add]');
  if(add && sc.contains(add)){
    const cta=sc.querySelector('.fd-cta');
    const prEl=sc.querySelector('.fd-row .price');
    const fin=prEl?(+prEl.textContent.replace(/[^\d]/g,'')):0;
    const newSt=detailFood.st||'';
    const doAdd=()=>{
      cart.active=true; cart.fin=fin; cart.qty=1; cart.mn=detailFood.mn; cart.st=newSt;
      cta.innerHTML=`<div class="cbtn cartview" data-go="cart"><span class="cv-left"><span class="qbadge">1</span>카트 보기</span><span class="cv-price"><span class="old">${won(fin+2000)}</span>${won(fin)}</span></div>`;
      showCartToast();
    };
    if(cart.active && cart.st && newSt && cart.st!==newSt){ showStoreConflict(doAdd); }
    else { doAdd(); }
    return;
  }
  // 음식 카드의 장바구니 아이콘 → 바로 담기 (상세 이동 X)
  const ac=e.target.closest('.addcart');
  if(ac && sc.contains(ac)){
    const card=ac.closest('[data-mn]');
    if(card){
      const newSt=card.dataset.st||'';
      const fin=+((card.dataset.pr||'').replace(/[^\d]/g,''))||cart.fin;
      const doAdd=()=>{
        cart.active=true; cart.fin=fin; cart.qty=1; cart.mn=card.dataset.mn||''; cart.st=newSt;
        ac.classList.add('added'); ac.innerHTML='1';
        flashToast('장바구니에 담았어요');
        const exb=sc.querySelector('.cartbar .cbtn');
        if(exb){ exb.innerHTML=`${mi('shopping_cart','fill')}<span class="old">${won(fin+5000)}</span>${won(fin)} 카트보기`; }
        else { injectCartBar(sc,current); }
      };
      if(cart.active && cart.st && newSt && cart.st!==newSt){ showStoreConflict(doAdd); }
      else { doAdd(); }
    }
    return;
  }
  // 가게 카드 펼치기/접기 (지점별 재주문 메뉴)
  const ex=e.target.closest('[data-expand]');
  if(ex && sc.contains(ex)){
    const card=ex.closest('.store-card');
    const open=card.classList.toggle('expanded');
    const chev=ex.querySelector('.material-symbols-rounded');
    if(chev) chev.outerHTML=mi(open?'keyboard_arrow_up':'keyboard_arrow_down');
    return;
  }
  // category chip select (filters food & store lists in place)
  const chip=e.target.closest('.chip');
  if(chip && sc.contains(chip)){
    if(dMoved){ return; }
    const cat=chip.textContent.trim();
    chip.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.remove('on','blue'));
    chip.classList.add('on'); if(cat==='전체') chip.classList.add('blue');
    renderFav(sc);
    return;
  }
  // open payment password pad
  const pay=e.target.closest('[data-pay]');
  if(pay && sc.contains(pay)){ openPayPad(); return; }
  // navigate
  const go=e.target.closest('[data-go]');
  if(go && sc.contains(go)){
    if(go.getAttribute('data-go')==='foodDetail' && go.dataset.mn){
      detailFood={mn:go.dataset.mn,img:go.dataset.img||'bburingkle',pr:go.dataset.pr||'',st:go.dataset.st||'',good:go.dataset.good||'',rev:go.dataset.rev||'',sub:go.dataset.sub||'',cat:go.dataset.cat||STORE_CAT[go.dataset.st]||'치킨'};
    }
    if(go.getAttribute('data-go')==='storeDetail' && go.dataset.snm){
      detailStore = STORE_BY_NAME[go.dataset.snm] || {nm:go.dataset.snm,star:'4.9',cnt:'1,000',img:'greenbg'};
    }
    navigate(go.getAttribute('data-go')); return;
  }
  // back
  const bk=e.target.closest('[data-back]');
  if(bk && sc.contains(bk)){
    if(bk.classList.contains('sheet-wrap')||bk.classList.contains('dim')){ if(e.target===bk) goBack(); return; }
    goBack();
  }
});
function fitDevice(){
  const dev=document.querySelector('.device'); if(!dev) return;
  if(window.matchMedia('(max-width:560px)').matches){ dev.style.transform=''; return; }
  const s=Math.min((window.innerWidth-40)/360,(window.innerHeight-40)/800,1.6);
  dev.style.transform='scale('+Math.max(s,0.5).toFixed(3)+')';
}
window.addEventListener('resize',fitDevice);
setScreen('home');
fitDevice();
loadFavorites();
</script>
</body>
</html>
